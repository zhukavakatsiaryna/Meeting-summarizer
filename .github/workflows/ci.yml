name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/meeting-api-service
  PROCESSOR_IMAGE: ghcr.io/${{ github.repository_owner }}/meeting-processor-service

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build (skip tests)
        run: ./gradlew build -x test --no-daemon

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            meeting-api-service/build/libs/*.jar
            meeting-processor-service/build/libs/*.jar
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          retention-days: 7

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-xml
          path: "**/build/test-results/**/*.xml"
          retention-days: 7

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push meeting-api-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: meeting-api-service/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push meeting-processor-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: meeting-processor-service/Dockerfile
          push: true
          tags: |
            ${{ env.PROCESSOR_IMAGE }}:${{ github.sha }}
            ${{ env.PROCESSOR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

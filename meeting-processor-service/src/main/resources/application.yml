spring:
  application:
    name: meeting-processor-service
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meetingdb}
    username: ${DB_USER:meetinguser}
    password: ${DB_PASSWORD:meetingpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: meeting-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.example.meetingprocessor.dto.MeetingUploadedEvent

openai:
  api:
    key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: ${OPENAI_MODEL:gpt-4o-mini}

aws:
  region: ${AWS_REGION:us-east-1}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  sqs:
    queue-url: ${SQS_QUEUE_URL:}
